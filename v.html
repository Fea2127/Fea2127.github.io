<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visitor Count Sample</title>
    <style>
      :root {
        --bg: #0d0f17;
        --surface: rgba(23, 26, 41, 0.6);
        --primary: #45a9e7;
        --accent: #00e5ff;
        --text: #e4e6eb;
        --text-dim: #8a91a8;
        --radius: 16px;
        --blur: blur(20px);
        --neon: 0 0 4px var(--primary), 0 0 12px var(--primary);
        --transition: all 0.3s ease;
        font-size: 16px;
      }
      #visitorCounter {
        border: #333;
        border-radius: 30px;
        background-color: var(--surface);
        border: var(--accent);
        padding: 50px;
        margin: auto;
      }
      body {
        background-color: #0d0f17;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      /* #container {
        display: flex;
        gap: 50px;
        border: #333 1px solid;
        border-radius: 15px;
        padding: 20px;
      }
      div {
        text-align: center;
      }
      span {
        font-size: 2em;
        color: #333;
      } */
    </style>
  </head>
  <body>
    <!-- newest -->
    <div id="visitorCounter">
      <a href="https://www.counters-free.net/">free Counters</a>
      <script
        type="text/javascript"
        src="https://www.freevisitorcounters.com/auth.php?id=9bc68a71460c487e00c94672f0e75a7e98d46708"
      ></script>
      <script
        type="text/javascript"
        src="https://www.freevisitorcounters.com/en/home/counter/1524028/t/0"
      ></script>
    </div>
    <!-- newest -->

    <!-- <main id="container">
      <div>
        <span id="pageviews-count"></span>
        <h4>PageViews</h4>
      </div>
      <div>
        <span id="visits-count"></span>
        <h4>Visits</h4>
      </div>
    </main> -->
    <script>
      const pageViewsCountElement = document.getElementById("pageviews-count");
      const visitsCountElement = document.getElementById("visits-count");

      if (sessionStorage.getItem("visit") === null) {
        //New visit and page view
        updateCounter("type=visit-pageview");
      } else {
        //Pageview only
        updateCounter("type=pageview");
      }

      function updateCounter(type) {
        fetch("https://127.0.0.1:3000?" + type)
          .then((response) => response.json())
          .then((data) => {
            pageViewsCountElement.textContent = data.pageViews;
            visitsCountElement.textContent = data.visits;
          });
      }

      sessionStorage.setItem("visit", "x");
    </script>
  </body>
</html>
